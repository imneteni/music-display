appId: com.musicdisplay.app
productName: Music Display
afterPack: ./after-pack.cjs
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  - from: build/icon.svg
    to: icon.svg
  - from: build/icon.png
    to: icon.png
  - from: resources/windows
    to: windows
    filter:
      - '**/*'
mac:
  category: public.app-category.music
  target:
    - dmg
    - zip
  extendInfo:
    # Hide from the Dock so it behaves like a floating HUD widget (optional).
    LSUIElement: false
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
