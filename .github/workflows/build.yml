name: Build installers

# Builds the macOS .dmg and Windows .exe installers.
# - Push a tag like v1.0.0 to attach the artifacts to a GitHub Release.
# - Or run manually (Actions tab -> Build installers -> Run workflow) and
#   download the installers from the run's "Artifacts" section.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer (${{ matrix.platform }})
        run: npm run dist:${{ matrix.platform }}
        env:
          # Skip code signing in CI (unsigned build). Add certificates here later
          # if you want signed/notarized output.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: music-display-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
