name: Build installers

# Builds the macOS .dmg and Windows .exe installers.
# - Push a tag like v1.0.0 to attach the artifacts to a GitHub Release.
# - Or run manually (Actions tab -> Build installers -> Run workflow) and
#   download the installers from the run's "Artifacts" section.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required so the release step can create the Release and upload installers.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer (${{ matrix.platform }})
        run: npm run dist:${{ matrix.platform }}
        env:
          # macOS Developer ID signing + notarization. Only fed to the mac job;
          # blanked on Windows so it doesn't try to use a mac cert. If these
          # secrets are unset, the mac build falls back to ad-hoc signing.
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: music-display-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
